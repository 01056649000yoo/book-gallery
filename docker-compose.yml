services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-username/book-gallery}:latest
    container_name: book-gallery
    restart: unless-stopped
    ports:
      - "3005:3000"
    env_file:
      - .env.local
    environment:
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ./uploads:/app/uploads
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
